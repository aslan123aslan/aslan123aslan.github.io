<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Купить</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

    <header class="header">
    <div class="logo">
        <img src="logo.png" alt="logo">
        <span style="color: #31fc96; font-weight: 900; font-size: 22px;">Магазин</span>
    </div>

    <!-- ПОИСК -->
    <div class="search-bar">
        <input type="text" placeholder="Найти продукты..." class="search-input">
        <button class="search-btn">🔍</button>
    </div>

    <nav class="nav">
        <a href="catalog.html">Каталог</a>
        <a href="#">Заказы</a>
        <a href="#">Акции</a>
    </nav>

    <div class="header-right">
        <!-- Корзина -->
        <div class="cart-wrapper">
            <span class="cart-icon">🛒</span>
            <span class="cart-count">5</span>
        </div>
        <a href="#" class="login-btn">Войти</a>
    </div>
    </header>
    
<div class="allproductcard">
    <!-- Левая часть: Картинка -->
    <div class="divproductphoto">
        <img class="productphoto" src="images/yogurt.jpg" alt="Йогурт Савушкин">
    </div>

    <!-- Правая часть: Описание -->
    <div class="producttext">
        <div class="brand-tag">Савушкин</div>
        <h1 class="productname">Йогурт со вкусом лесные ягоды</h1>

        <!-- КБЖУ как в приложении Перекрестка -->
        <div class="nutrition-row">
            <div class="n-item"><b>87.6</b> <span>ккал</span></div>
            <div class="n-item"><b>2.9г</b> <span>белки</span></div>
            <div class="n-item"><b>2.0г</b> <span>жиры</span></div>
            <div class="n-item"><b>14.5г</b> <span>углев.</span></div>
        </div>

        <!-- Цена и кнопка -->
        <div class="price-action">
            <div class="price-info">
                <span class="main-price">54.99 ₽</span>
                <span class="weight">120 г</span>
            </div>
            <button class="buy-button">В корзину</button>
        </div>

        <!-- Состав -->
        <div class="productdescription">
            <h3>Состав:</h3>
            <p>Молоко нормализованное пастеризованное, фруктовый наполнитель "Лесная ягода" (сахар, соки и пюре клубники, ежевики, малины, черники...), закваска.</p>
        </div>
    </div>
</div>
</body>
</html>
